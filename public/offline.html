<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフライン - 就活管理</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        color: #0f172a;
      }

      article {
        width: min(92vw, 420px);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.84);
        padding: 28px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        line-height: 1.8;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>オフラインです</h1>
      <p>通信が戻ると最新の予定やメールが読み込まれます。保存済みの一部画面はホーム画面アプリとして引き続き使えます。</p>
    </article>
  </body>
  </html>
